name: CI

on:
  push:
    branches: [main, integration]
  pull_request:

jobs:
  build:
    name: Build & Test — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # rodio (namespace Media) enlaza ALSA en Linux; sus cabeceras no vienen
      # en ubuntu-latest. Sin esto, alsa-sys falla al compilar.
      - name: Install ALSA (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev pkg-config

      - name: Build
        run: cargo build

      - name: Check (no warnings as errors)
        run: cargo check
