name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: write

jobs:
  build:
    name: Build — ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: Windows x64
            target: x86_64-pc-windows-msvc
            binary: sz.exe
            asset: sz-windows-x64.exe

          - os: ubuntu-latest
            name: Linux x64
            target: x86_64-unknown-linux-musl
            binary: sz
            asset: sz-linux-x64

          - os: macos-latest
            name: macOS ARM64
            target: aarch64-apple-darwin
            binary: sz
            asset: sz-macos-arm64

          - os: macos-latest
            name: macOS x64
            target: x86_64-apple-darwin
            binary: sz
            asset: sz-macos-x64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (Linux)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools

      - name: Build release binary
        env:
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        shell: bash
        run: cp target/${{ matrix.target }}/release/${{ matrix.binary }} ${{ matrix.asset }}

      - name: Install cargo-wix (Windows only)
        if: matrix.target == 'x86_64-pc-windows-msvc'
        run: cargo install cargo-wix --no-default-features

      - name: Build MSI installer (Windows only)
        if: matrix.target == 'x86_64-pc-windows-msvc'
        run: cargo wix --no-build --target x86_64-pc-windows-msvc --nocapture

      - name: Rename MSI (Windows only)
        if: matrix.target == 'x86_64-pc-windows-msvc'
        shell: bash
        run: cp target/wix/*.msi sz-windows-x64-setup.msi

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

      - name: Upload MSI artifact (Windows only)
        if: matrix.target == 'x86_64-pc-windows-msvc'
        uses: actions/upload-artifact@v7
        with:
          name: sz-windows-x64-setup.msi
          path: sz-windows-x64-setup.msi

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum * > checksums.txt

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Serez-Code ${{ github.ref_name }}" \
            --generate-notes \
            artifacts/sz-windows-x64-setup.msi \
            artifacts/sz-windows-x64.exe \
            artifacts/sz-linux-x64 \
            artifacts/sz-macos-arm64 \
            artifacts/sz-macos-x64 \
            artifacts/checksums.txt
